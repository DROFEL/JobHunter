apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Jaeger
    type: jaeger
    url: http://jaeger:16686
    editable: true

  - name: Elasticsearch
    type: elasticsearch
    url: http://elasticsearch:9200
    editable: true
    jsonData:
      index: otel-logs
      timeField: "@timestamp"
      esVersion: "8.0.0"
      logMessageField: body
      logLevelField: severity_text
